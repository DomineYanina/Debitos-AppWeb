<div class="auditoria-container">
  <header class="page-header">
    <h2>Buscador de Documentos</h2>
    <button class="btn-logout" (click)="onLogout()">Cerrar Sesión</button>
  </header>

  <section class="busqueda-section">
    <form [formGroup]="busquedaForm" (ngSubmit)="onBuscar()" class="fila-filtros">

      <div class="form-group">
        <label for="tipo">Tipo</label>
        <select id="tipo" formControlName="tipo">
          <option value="">Seleccionar...</option>
          <option value="Factura">Factura (FC)</option>
          <option value="NotaCredito">Nota de Crédito (NC)</option>
          <option value="NotaDebito">Nota de Débito (ND)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="letra">Letra</label>
        <input id="letra" type="text" formControlName="letra" placeholder="A, B, C..." maxlength="1" oninput="this.value = this.value.toUpperCase()">
      </div>

      <div class="form-group">
        <label for="puntoVenta">Pto. Venta</label>
        <input id="puntoVenta" type="number" formControlName="puntoVenta" placeholder="Ej: 10">
      </div>

      <div class="form-group">
        <label for="numero">Número</label>
        <input id="numero" type="number" formControlName="numero" placeholder="Ej: 12345678">
      </div>

      <div class="form-group btn-container">
        <button type="submit" [disabled]="busquedaForm.invalid" class="btn-buscar">Buscar</button>
      </div>

    </form>
  </section>

  <section class="grilla-section">
    <div class="grilla-placeholder">
      <p>Acá se va a renderizar la grilla con las prestaciones del documento...</p>
    </div>
  </section>
</div>
