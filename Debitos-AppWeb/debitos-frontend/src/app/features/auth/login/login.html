<div class="login-container">
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
    <h2>Sistema de Débitos</h2>

    <div class="form-group">
      <label for="usuario">Usuario</label>
      <input id="usuario" type="text" formControlName="usuario" placeholder="Ingresá tu usuario">
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input id="password" type="password" formControlName="password" placeholder="Ingresá tu contraseña">
    </div>

    <button type="submit" [disabled]="loginForm.invalid">Ingresar</button>
  </form>
</div>
